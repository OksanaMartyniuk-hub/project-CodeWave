<section class="popular-products" id="popular">
  <div class="container">
    <h2 class="section-title">Наші бестселери</h2>

    <div class="swiper popular-swiper">
      <div class="swiper-wrapper" id="popularSwiperWrapper"></div>
    </div>

    <div class="popular-products__controls">
      <div class="swiper-pagination popular-pagination"></div>
      <div class="popular-products__nav">
        <button class="swiper-nav-btn" id="popularPrev" aria-label="Попередній">
          <svg class="swiper-nav-icon" width="24" height="24">
            <use href="/img/sprite.svg#icon-arrow_back"></use>
          </svg>
        </button>
        <button class="swiper-nav-btn" id="popularNext" aria-label="Наступний">
          <svg class="swiper-nav-icon" width="24" height="24">
            <use href="/img/sprite.svg#icon-arrow_forward"></use>
          </svg>
        </button>
      </div>
    </div>
  </div>
</section>
