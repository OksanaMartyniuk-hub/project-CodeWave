<div
  class="modal-overlay"
  id="orderOverlay"
  role="dialog"
  aria-modal="true"
  aria-label="Оформлення замовлення"
  hidden
>
  <div class="modal order-modal" id="orderModal">
    <button class="modal__close" id="orderClose" aria-label="Закрити">
      <svg width="24" height="24">
        <use href="/img/sprite.svg#icon-close"></use>
      </svg>
    </button>

    <h2 class="order-modal__title">Оформлення замовлення</h2>

    <form class="order-form" id="orderForm" novalidate>
      <div class="form-group">
        <label class="form-label" for="orderName">Ім'я*</label>
        <input
          class="form-input"
          type="text"
          id="orderName"
          name="name"
          placeholder="Іван Франко"
          required
          autocomplete="given-name"
        />
        <span class="form-error" id="nameError"></span>
      </div>

      <div class="form-group">
        <label class="form-label" for="orderPhone">Телефон*</label>
        <input
          class="form-input"
          type="tel"
          id="orderPhone"
          name="phone"
          placeholder="380961234568"
          required
          autocomplete="tel"
        />
        <span class="form-error" id="phoneError"></span>
      </div>

      <div class="form-group">
        <label class="form-label" for="orderComment">Коментар*</label>
        <textarea
          class="form-input form-textarea"
          id="orderComment"
          name="comment"
          placeholder="Зателефонуйте, будь-ласка, для уточнення деталей."
          required
        ></textarea>
        <span class="form-error" id="commentError"></span>
      </div>

      <div class="form-submit-wrap">
        <button type="submit" class="btn btn-accent form-submit">
          Надіслати заявку
        </button>
      </div>
    </form>
  </div>
</div>
